version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mixi_db
    restart: always
    environment:
      MYSQL_DATABASE: mixi_shop
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # Sử dụng biến môi trường từ Jenkins
    volumes:
      - [cite_start]./DB/mixi_shop.sql:/docker-entrypoint-initdb.d/mixi_shop.sql [cite: 1]
    networks:
      - mixi_network

  web:
    build: .
    container_name: mixi_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - mixi_network

networks:
  mixi_network:
    driver: bridge
