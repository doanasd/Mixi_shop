version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mixi_db
    restart: always
    environment:
      MYSQL_DATABASE: mixi_shop
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./DB/mixi_shop.sql:/docker-entrypoint-initdb.d/mixi_shop.sql
    networks:
      - mixi_network

  web:
    # XÓA dòng: build: .
    image: doanasd/mixi_shop:latest # THÊM dòng này để gọi thẳng Image từ Docker Hub
    container_name: mixi_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - mixi_network

networks:
  mixi_network:
    driver: bridge
