version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mixi_db
    restart: always
    environment:
      MYSQL_DATABASE: mixi_shop
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # Lấy mật khẩu từ file Jenkinsfile
    volumes:
      - ./DB/mixi_shop.sql:/docker-entrypoint-initdb.d/mixi_shop.sql
    networks:
      - mixi_network

  web:
    build: .
    container_name: mixi_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      - DB_PASSWORD=${DB_PASSWORD} # Truyền mật khẩu vào container Web cho mã nguồn PHP
    networks:
      - mixi_network

networks:
  mixi_network:
    driver: bridge
