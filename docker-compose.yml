version: '3.8'

services:
  # Ứng dụng Web 
  web:
    image: doanasd/mixi_shop:latest
    container_name: mixi_app
    restart: always
    environment:
      - DB_PASSWORD=${DB_PASSWORD} # Docker sẽ lấy biến này từ máy chủ Ubuntu để nhét vào PHP
    volumes:
      - ./honeypot.log:/var/www/honeypot_access.log
    networks:
      - mixi_network

  # Tường lửa WAF 
  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: mixi_waf
    restart: always
    ports:
      - "80:8080"
    environment:
      - BACKEND=http://web:80
      - MODSEC_RULE_ENGINE=On
    volumes:
      - ./waf_logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - mixi_network

networks:
  mixi_network:
    driver: bridge
